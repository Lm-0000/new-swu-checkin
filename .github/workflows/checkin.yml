name: 西南大学每日打卡

on:
  schedule:
    # 北京时间 23:30 执行（UTC 15:30）
    - cron: '30 15 * * *'
  workflow_dispatch:              # 支持手动触发（用于测试）

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖（Chromium 浏览器）
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install drissionpage ddddocr requests

      - name: 执行打卡脚本
        env:
          SWU_USERNAME: ${{ secrets.SWU_USERNAME }}
          SWU_PASSWORD: ${{ secrets.SWU_PASSWORD }}
        run: python checkin.py
